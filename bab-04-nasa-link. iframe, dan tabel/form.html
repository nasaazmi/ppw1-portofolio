<!DOCTYPE html>
<html>
    <head>
        <title>Belajar Membuat Form</title>
    </head>
    <body>
        <form>Masukkan nama depan:
            <input type="text" name="nama depan">
            <br>
            Masukkan nama belakang:
            <input type="text" name="nama belakang">
            <br>
            Masukkan password:
            <input type="password" name="password">
            <br>
        </form>
        <p>
            Perhatikan bahwa ketika Anda mengetikkan karakter-karakter dalam suatu field password, browser akan menampilkan asterisk atau bullet saja, bukanya karaktern yang diketikkan.
        </p>
    </body>
</html>
