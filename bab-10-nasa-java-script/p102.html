<!DOCTYPE html>
<html>
<head>
    <title>Tugas Bab 10 No.2</title>
    <script>
        // 1. console.log
        console.log("Halo dari console.log!");

        // 2. alert
        alert("Halo dari alert!");

        // 3. document.write
        document.write("<h2>Halo dari document.write!</h2>");
    </script>
</head>
<body>
    <h2>Tugas Bab 10 No.2 - Output JavaScript</h2>

    <!-- 4. innerHTML -->
    <p id="output">Teks ini akan diubah oleh innerHTML</p>
    <button onclick="document.getElementById('output').innerHTML = 'Halo dari innerHTML!'">
        Klik untuk innerHTML
    </button>
</body>
</html>
