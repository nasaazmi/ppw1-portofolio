<!DOCTYPE html>
<html>
    <head>
        <title>Latihan text</title>
        <style>
            .indent {
                text-indent: 50px;
            }
            .letter {
                letter-spacing: 5px;
            }
            .word {
                word-spacing: 20px;
            }
            .height {
                line-height: 3;
            }
            .space {
                white-space: pre;
            }
        </style>
    </head>
    <body>
        <h1 class="indent">Halo, saya sedang belajar text-indent </h1>
        <h1 class="letter">Halo, saya sedang belajar letter-spacing </h1>
        <h1 class="word">Halo, saya sedang belajar word-spacing </h1>
        <h1 class="height">Halo, saya sedang belajar line-height </h1>
        <h1 class="space">Halo, saya sedang belajar white-space </h1>
    </body>
</html>
