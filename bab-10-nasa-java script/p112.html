<!DOCTYPE html>
<html>
<head>
    <title>Bab 11 No.2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<h2>Cek Praktikan PPW1</h2>

Apakah anda praktikan PPW1? 
<input type="radio" name="status" value="ya" id="ya"> <label for="ya">Ya</label>
<input type="radio" name="status" value="tidak" id="tidak"> <label for="tidak">Tidak</label>
<br><br>

<div id="formData" style="display:none;">
    Nama &nbsp;&nbsp;&nbsp;: <input type="text" id="nama"><br><br>
    NIM &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: <input type="text" id="nim"><br><br>
    Angkatan : <input type="text" id="angkatan"><br><br>
</div>

<button onclick="cek()">Submit</button>

<div id="hasil" class="mt-3"></div>

<script>
    document.querySelectorAll('input[name="status"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            document.getElementById("formData").style.display =
                this.value === "ya" ? "block" : "none";
        });
    });

    function cek() {
        var status = document.querySelector('input[name="status"]:checked');

        if (!status) {
            document.getElementById("hasil").innerHTML = "<b>Pilih salah satu pilihan!</b>";
            return;
        }

        if (status.value === "tidak") {
            document.getElementById("hasil").innerHTML =
                '<div class="alert alert-danger fw-bold">Anda bukan praktikan PPW1, anda tidak boleh masuk!</div>';
            return;
        }

        var nama     = document.getElementById("nama").value;
        var nim      = document.getElementById("nim").value;
        var angkatan = document.getElementById("angkatan").value;

        if (!nama || !nim || !angkatan) {
            document.getElementById("hasil").innerHTML = "<b>Lengkapi semua data!</b>";
            return;
        }

        document.getElementById("hasil").innerHTML =
            '<h4>Data Praktikan PPW1</h4>' +
            '<table class="table table-bordered w-50">' +
                '<tr><th>Nama</th><td>' + nama + '</td></tr>' +
                '<tr><th>NIM</th><td>' + nim + '</td></tr>' +
                '<tr><th>Angkatan</th><td>' + angkatan + '</td></tr>' +
            '</table>';
    }
</script>

</body>
</html>
